name: Release

# При пуше тега v* (например v0.2.0) проверяет SemVer-формат тега,
# запускает unit-тесты, собирает подписанные release-APK для ARM ABI
# и universal APK, затем публикует их в GitHub Releases и обновляет
# GitHub Pages манифест updates/latest.json для автообновлений.
# Сборка debug APK на main/PR — в workflow ci.yml.
#
# Требуются секреты репозитория (Settings → Secrets and variables → Actions):
#   KEYSTORE_BASE64          — base64 релизного keystore (см. README, раздел CI/Releases)
#   RELEASE_STORE_PASSWORD   — пароль от keystore
#   RELEASE_KEY_ALIAS        — алиас ключа подписи
#   RELEASE_KEY_PASSWORD     — пароль от ключа
# Имена env-переменных совпадают с теми, что читаются в app/build.gradle.kts.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # нужно для создания GitHub Release и загрузки ассетов
  pages: write # нужно для публикации updates/latest.json на GitHub Pages
  id-token: write # нужно actions/deploy-pages

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # не отменяем релизный билд — пусть дойдёт до конца

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # нужен авто-версиированию (versionName/versionCode из git)

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate release tag
        id: version
        run: |
          TAG="$GITHUB_REF_NAME"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tag must use SemVer with a leading v, for example v0.2.0."
            exit 1
          fi

          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Run unit tests
        run: ./gradlew test --stacktrace

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          # Восстанавливаем релизный keystore в корень репозитория.
          # app/build.gradle.kts по умолчанию ожидает release.keystore там.
          echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore
          # Подстраховка: роняем шаг, если декодированный файл пуст или слишком мал.
          if [ ! -s release.keystore ]; then
            echo "::error::Decoded keystore is empty. Check KEYSTORE_BASE64 secret."
            exit 1
          fi

      - name: Assemble signed release APK
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease -PenableAbiSplits=true --stacktrace

      - name: Prepare release APKs
        id: apks
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OUTPUT_DIR="app/build/outputs/apk/release"
          ARTIFACT_DIR="release-artifacts"
          mkdir -p "$ARTIFACT_DIR"

          cp "$OUTPUT_DIR/app-universal-release.apk" "$ARTIFACT_DIR/eBookSender-v${VERSION}-universal.apk"
          cp "$OUTPUT_DIR/app-arm64-v8a-release.apk" "$ARTIFACT_DIR/eBookSender-v${VERSION}-arm64-v8a.apk"
          cp "$OUTPUT_DIR/app-armeabi-v7a-release.apk" "$ARTIFACT_DIR/eBookSender-v${VERSION}-armeabi-v7a.apk"

          {
            echo "files<<EOF"
            find "$ARTIFACT_DIR" -name '*.apk' -type f | sort
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate update manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_CODE="$(git rev-list --count HEAD)"
          TAG="${GITHUB_REF_NAME}"
          ARTIFACT_DIR="release-artifacts"
          SITE_DIR="site/updates"
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          RELEASED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          mkdir -p "$SITE_DIR"

          universal="eBookSender-v${VERSION}-universal.apk"
          arm64="eBookSender-v${VERSION}-arm64-v8a.apk"
          armv7="eBookSender-v${VERSION}-armeabi-v7a.apk"

          cat > "$SITE_DIR/latest.json" <<EOF
          {
            "schemaVersion": 1,
            "packageName": "com.cybercat.ebooksender",
            "versionName": "$VERSION",
            "versionCode": $VERSION_CODE,
            "minSdk": 26,
            "releasedAt": "$RELEASED_AT",
            "changelogUrl": "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}",
            "artifacts": [
              {
                "abi": "universal",
                "fileName": "$universal",
                "url": "$RELEASE_URL/$universal",
                "sha256": "$(sha256sum "$ARTIFACT_DIR/$universal" | cut -d ' ' -f 1)",
                "sizeBytes": $(stat -c%s "$ARTIFACT_DIR/$universal")
              },
              {
                "abi": "arm64-v8a",
                "fileName": "$arm64",
                "url": "$RELEASE_URL/$arm64",
                "sha256": "$(sha256sum "$ARTIFACT_DIR/$arm64" | cut -d ' ' -f 1)",
                "sizeBytes": $(stat -c%s "$ARTIFACT_DIR/$arm64")
              },
              {
                "abi": "armeabi-v7a",
                "fileName": "$armv7",
                "url": "$RELEASE_URL/$armv7",
                "sha256": "$(sha256sum "$ARTIFACT_DIR/$armv7" | cut -d ' ' -f 1)",
                "sizeBytes": $(stat -c%s "$ARTIFACT_DIR/$armv7")
              }
            ]
          }
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.apks.outputs.files }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          # generate_release_notes: GitHub сам соберёт список PR/коммитов
          # с прошлого релиза по этот тег.

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    name: Deploy Update Manifest
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
