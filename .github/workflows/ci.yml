name: CI

# Сборка и unit-тесты на каждый пуш в main и на каждый Pull Request.
# Быстрый фидбэк: ловит ошибки компиляции, упаковки ресурсов и регрессии в тестах
# до того, как код попадёт в main. Релизные сборки и публикацию в Releases
# выполняет отдельный workflow release.yml по тегу v*.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Отменяем устаревшие запуски того же workflow/ветки/PR — экономит минуты CI.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # полный нужен авто-версиированию из git (git describe / rev-list)

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          # main пишет в кеш, PR/ветки только читают — снижает риск конкуренции кешей.

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Run unit tests
        run: ./gradlew test --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: ebooksender-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            **/build/test-results/**/*.xml
            **/build/reports/tests/**
          if-no-files-found: ignore
          retention-days: 14
